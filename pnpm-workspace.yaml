# Project settings for pnpm 11 (reads these from workspace yaml, not only .npmrc)
strictDepBuilds: false
verifyDepsBeforeRun: false
confirmModulesPurge: false

# Build-script allowlist. puppeteer is screenshot tooling only.
allowBuilds:
  esbuild: true
  sharp: true
  "@swc/core": true
  puppeteer: false
